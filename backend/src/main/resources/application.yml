server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: utsc-carpool-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:utsc_carpool}
    username: ${DB_USERNAME:ruichensong}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  security:
    jwt:
      secret: ${JWT_SECRET:replace-with-at-least-256-bit-secret}
      access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
      refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mapbox:
    access-token: ${MAPBOX_ACCESS_TOKEN:}
