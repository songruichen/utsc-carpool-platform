spring:
  datasource:
    url: jdbc:h2:mem:utsc_carpool_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  security:
    jwt:
      secret: test-secret-must-be-at-least-thirty-two-characters-long
      access-token-expiration-ms: 900000
      refresh-token-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:5173
  mapbox:
    access-token:
